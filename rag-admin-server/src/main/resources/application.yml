spring:
  application:
    name: rag-admin-server
  profiles:
    default: local
  jackson:
    default-property-inclusion: non_null
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  config: classpath:logback-spring.xml

rag:
  auth:
    jwt-secret: ${RAG_JWT_SECRET:rag-admin-dev-secret-key-change-me-2026}
    access-token-ttl-seconds: 7200
    refresh-token-ttl-seconds: 604800
    bootstrap:
      admin-username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
      admin-display-name: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:系统管理员}
      admin-mobile: ${BOOTSTRAP_ADMIN_MOBILE:13800000000}
      admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:Admin@123456}
  internal:
    callback-token: ${RAG_INTERNAL_CALLBACK_TOKEN:rag-admin-internal-callback-token}
  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://127.0.0.1:11434}
      timeout-seconds: 30
  storage:
    minio:
      endpoint:
      port: 9000
      use-ssl: false
      access-key:
      secret-key:
      bucket-name:
      public-url:
  vector:
    milvus:
      base-url: ${MILVUS_BASE_URL:http://127.0.0.1:19530}
      token: ${MILVUS_TOKEN:root:Milvus}
      enabled: ${MILVUS_ENABLED:true}
