spring:
  application:
    name: rag-admin-server
  profiles:
    default: local
  jackson:
    default-property-inclusion: non_null
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 9212

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

logging:
  config: classpath:logback-spring.xml

rag:
  auth:
    access-token-ttl-seconds: 7200
    refresh-token-ttl-seconds: 604800
  ai:
    # 主配置仅保留跨环境共享基线，具体地址和敏感值放到 profile 或本地私有文件。
    default-provider: BAILIAN
    bailian:
      enabled: true
      api-key:
      default-chat-model: qwen-max
      default-embedding-model: text-embedding-v3
      timeout-seconds: 60
    ollama:
      enabled: false
      default-chat-model: qwen2.5:7b
      default-embedding-model: nomic-embed-text
      timeout-seconds: 30
  storage:
    minio:
      port: 9000
      use-ssl: false
  vector:
    milvus:
      enabled: true
  retrieval:
    default-top-k: 5
    max-context-chunks: 5
    max-context-chars: 4000
    reference-snippet-chars: 200
  document:
    ocr:
      enabled: false
      tesseract-command: tesseract
      language: chi_sim+eng
      max-pdf-pages: 5
