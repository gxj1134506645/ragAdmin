# 复制为 application-local-secret.yml 后按本机实际情况填写。
# 该文件应仅本地使用，不要提交到仓库。
rag:
  ai:
    bailian:
      # 是否启用百炼，可按需覆盖。
      enabled: true
      # 百炼网关地址，通常无需修改。
      base-url: https://dashscope.aliyuncs.com
      api-key: your-bailian-api-key
      # 可按需覆盖平台级兜底默认模型。
      default-chat-model: qwen-max
      default-embedding-model: text-embedding-v3
