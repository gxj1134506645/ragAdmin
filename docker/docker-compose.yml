services:
  postgres:
    image: postgres:16
    container_name: rag-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rag_admin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_admin"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: rag-admin-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "ragadmin123"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ragadmin123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: rag-admin-etcd
    restart: unless-stopped
    command:
      - /usr/local/bin/etcd
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: rag-admin-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    container_name: rag-admin-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb --ignore-existing local/ragadmin
      "

  # Elasticsearch：当前作为可选检索/分析基础设施使用。
  # 开发环境采用单节点模式，并关闭 xpack 安全认证，便于本地直接联调。
  # 当前通过自定义镜像在构建阶段预装 IK 中文分词器，容器重建后不会丢失。
  # 访问地址：
  # - ES API: http://127.0.0.1:9200
  # - Transport: 127.0.0.1:9300
  elasticsearch:
    build:
      context: .
      dockerfile: elasticsearch/Dockerfile
    image: rag-admin-elasticsearch-ik:8.17.3
    container_name: rag-admin-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:9200/_cluster/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15

  # Kibana：与当前 ES 版本保持一致，用于索引、集群状态和检索结果的可视化检查。
  # 访问地址：
  # - Kibana UI: http://127.0.0.1:5601
  # 启动顺序上依赖 ES 健康后再启动，避免初始化阶段反复重连。
  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.3
    container_name: rag-admin-kibana
    restart: unless-stopped
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      I18N_LOCALE: zh-CN
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:5601/api/status >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  milvus:
    image: milvusdb/milvus:v2.5.5
    container_name: rag-admin-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin123
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      postgres:
        condition: service_healthy
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 15

  ollama:
    image: ollama/ollama:0.20.6
    container_name: rag-admin-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      # 官方镜像里没有 curl，直接复用 ollama CLI 做本地健康检查。
      # 这里不写死二进制绝对路径，避免后续镜像内部路径调整导致健康检查失效。
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15

  ollama-init:
    image: curlimages/curl:8.12.1
    container_name: rag-admin-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      curl -fsS http://ollama:11434/api/pull -d '{\"name\":\"qwen2.5:1.5b\"}' &&
      curl -fsS http://ollama:11434/api/pull -d '{\"name\":\"quentinz/bge-small-zh-v1.5\"}'
      "

volumes:
  postgres-data:
  redis-data:
  etcd-data:
  minio-data:
  elasticsearch-data:
  milvus-data:
  ollama-data:
