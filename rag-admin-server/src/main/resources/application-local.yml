spring:
  config:
    # 本地敏感配置通过未跟踪文件覆盖，避免提交到仓库。
    import: optional:classpath:application-local-secret.yml
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/rag_admin?sslmode=disable
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: ragadmin123
      database: 0
  threads:
    virtual:
      enabled: true

rag:
  auth:
    jwt-secret: rag-admin-local-secret-key-change-me
    bootstrap:
      admin-username: admin
      admin-display-name: 系统管理员
      admin-mobile: 13800000000
      admin-password: Admin@123456
  internal:
    callback-token: rag-admin-internal-callback-token
  ai:
    default-provider: BAILIAN
    bailian:
      enabled: true
      base-url: https://dashscope.aliyuncs.com
      default-chat-model: qwen-max
      default-embedding-model: text-embedding-v3
      timeout-seconds: 60
    ollama:
      enabled: false
      base-url: http://127.0.0.1:11434
      timeout-seconds: 180
  storage:
    minio:
      endpoint: 127.0.0.1
      port: 9000
      use-ssl: false
      access-key: minioadmin
      secret-key: minioadmin123
      bucket-name: ragadmin
      public-url: http://127.0.0.1:9000
  vector:
    milvus:
      base-url: http://127.0.0.1:19530
      token: root:Milvus
      enabled: true
