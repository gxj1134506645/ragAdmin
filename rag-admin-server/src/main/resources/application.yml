spring:
  application:
    name: rag-admin-server
  profiles:
    default: local
  ai:
    chat:
      memory:
        repository:
          jdbc:
            # schema 统一交给 Flyway，避免与启动初始化重复建表。
            initialize-schema: never
  jackson:
    default-property-inclusion: non_null
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 9212

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 7200
  active-timeout: -1
  is-concurrent: true
  is-share: false
  is-read-header: true
  is-read-cookie: false

logging:
  config: classpath:logback-spring.xml

rag:
  async:
    application:
      core-size: 8
      max-size: 16
      queue-capacity: 200
      keep-alive-seconds: 60
    scheduler:
      pool-size: 1
  auth:
    access-token-ttl-seconds: 7200
    refresh-token-ttl-seconds: 604800
  ai:
    # 主配置仅保留跨环境共享基线，具体地址和敏感值放到 profile 或本地私有文件。
    default-provider: BAILIAN
    chat:
      client:
        simple-logger-advisor-enabled: false
        simple-logger-max-text-length: 800
    bailian:
      enabled: true
      api-key:
      default-chat-model: qwen-max
      default-embedding-model: text-embedding-v3
      timeout-seconds: 60
    ollama:
      enabled: false
      default-chat-model: qwen2.5:7b
      default-embedding-model: nomic-embed-text
      timeout-seconds: 30
  storage:
    minio:
      port: 9000
      use-ssl: false
  vector:
    milvus:
      enabled: true
  retrieval:
    default-top-k: 5
    max-context-chunks: 5
    max-context-chars: 4000
    reference-snippet-chars: 200
  chat:
    memory:
      max-messages: 20
      short-term-rounds: 10
      short-term-idle-ttl-minutes: 120
      summary-trigger-rounds: 10
      summary-trigger-token-threshold: 4000
      summary-max-length: 2000
      summary-lock-seconds: 30
      refresh-max-concurrency: 8
      redis-key-prefix: rag:chat:memory
  document:
    parse:
      max-concurrency: 4
      dispatch-batch-size: 4
    ocr:
      enabled: false
      tesseract-command: tesseract
      language: chi_sim+eng
      max-pdf-pages: 5
