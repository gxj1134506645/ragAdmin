services:
  postgres:
    image: postgres:16
    container_name: rag-admin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rag_admin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_admin"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: rag-admin-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "ragadmin123"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "ragadmin123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    container_name: rag-admin-etcd
    restart: unless-stopped
    command:
      - /usr/local/bin/etcd
      - --advertise-client-urls=http://0.0.0.0:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --data-dir=/etcd
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: rag-admin-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:RELEASE.2025-02-15T10-36-16Z
    container_name: rag-admin-minio-init
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb --ignore-existing local/ragadmin
      "

  milvus:
    image: milvusdb/milvus:v2.5.5
    container_name: rag-admin-milvus
    restart: unless-stopped
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin123
    ports:
      - "127.0.0.1:19530:19530"
      - "127.0.0.1:9091:9091"
    volumes:
      - milvus-data:/var/lib/milvus
    depends_on:
      postgres:
        condition: service_healthy
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9091/healthz"]
      interval: 15s
      timeout: 10s
      retries: 15

  ollama:
    image: ollama/ollama:0.20.6
    container_name: rag-admin-ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      # 官方镜像里没有 curl，直接复用 ollama CLI 做本地健康检查。
      # 这里不写死二进制绝对路径，避免后续镜像内部路径调整导致健康检查失效。
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15

  ollama-init:
    image: curlimages/curl:8.12.1
    container_name: rag-admin-ollama-init
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      curl -fsS http://ollama:11434/api/pull -d '{\"name\":\"qwen2.5:1.5b\"}' &&
      curl -fsS http://ollama:11434/api/pull -d '{\"name\":\"quentinz/bge-small-zh-v1.5\"}'
      "

volumes:
  postgres-data:
  redis-data:
  etcd-data:
  minio-data:
  milvus-data:
  ollama-data:
