spring:
  application:
    name: rag-admin-server
  profiles:
    default: dev
  ai:
    chat:
      memory:
        repository:
          jdbc:
            # schema 统一交给 Flyway，避免与启动初始化重复建表。
            initialize-schema: never
  jackson:
    default-property-inclusion: non_null
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 9212

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 7200
  active-timeout: -1
  is-concurrent: true
  is-share: false
  is-read-header: true
  is-read-cookie: false

logging:
  config: classpath:logback-spring.xml

rag:
  async:
    application:
      core-size: 8
      max-size: 16
      queue-capacity: 200
      keep-alive-seconds: 60
    web-mvc-streaming:
      core-size: 4
      max-size: 16
      queue-capacity: 200
      keep-alive-seconds: 60
      request-timeout-ms: 0
    scheduler:
      pool-size: 1
  auth:
    access-token-ttl-seconds: 7200
    refresh-token-ttl-seconds: 604800
  ai:
    # 主配置仅保留跨环境共享基线，具体地址和敏感值放到 profile 或本地私有文件。
    default-provider: BAILIAN
    chat:
      client:
        simple-logger-advisor-enabled: false
        simple-logger-max-text-length: 800
        simple-logger-request-body-enabled: true
        simple-logger-response-body-enabled: false
      answer-metadata:
        enabled: true
        log-metadata: true
      execution-planning:
        enabled: true
        log-plan: true
    bailian:
      enabled: true
      api-key:
      timeout-seconds: 60
    ollama:
      enabled: false
      timeout-seconds: 30
    zhipu:
      enabled: false
      api-key:
      timeout-seconds: 60
  storage:
    minio:
      port: 9000
      use-ssl: false
  search-engine:
    elasticsearch:
      enabled: false
  vector:
    milvus:
      enabled: true
  retrieval:
    default-top-k: 5
    max-context-chunks: 5
    max-context-chars: 4000
    reference-snippet-chars: 200
    query-rewriting:
      multi-query-count: 3
      log-max-query-length: 120
  search:
    enabled: true
    default-top-k: 5
    context-max-chars: 2000
    log-query-max-chars: 120
    result-title-max-chars: 120
    result-snippet-max-chars: 320
  chat:
    memory:
      max-messages: 20
      short-term-rounds: 10
      short-term-idle-ttl-minutes: 120
      summary-trigger-rounds: 10
      summary-trigger-token-threshold: 4000
      summary-max-length: 2000
      summary-lock-seconds: 30
      refresh-max-concurrency: 8
      redis-key-prefix: rag:chat:memory
  document:
    parse:
      max-concurrency: 4
      dispatch-batch-size: 4
    mineru:
      enabled: false
      base-url: https://mineru.net
      api-token:
      model-version: vlm
      language: ch
      timeout-seconds: 60
      poll-interval-millis: 2000
      max-poll-attempts: 30
      max-pdf-pages: 600
    conversion:
      enabled: true
      libre-office-path: libreoffice
      timeout-seconds: 60
    chunk:
      default-max-chunk-chars: 800
      default-overlap-chars: 120
      default-min-chunk-chars: 50
      table:
        max-chunk-chars: 1600
        overlap-chars: 100
      image:
        max-chunk-chars: 600
        overlap-chars: 80
      mixed:
        max-chunk-chars: 1200
        overlap-chars: 100
    vectorize:
      defaults:
        embedding-batch-size: 10
        max-chunk-chars: 800
        chunk-overlap-chars: 120
        min-chunk-chars: 50
      provider-strategies:
        BAILIAN:
          embedding-batch-size: 10
          max-chunk-chars: 800
          chunk-overlap-chars: 120
          min-chunk-chars: 50
        OLLAMA:
          embedding-batch-size: 1
          max-chunk-chars: 400
          chunk-overlap-chars: 80
          min-chunk-chars: 50
